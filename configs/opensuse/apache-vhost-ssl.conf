# HTTPS vhost — openSUSE (apache2)

<VirtualHost *:443>
    ServerName YOUR_DOMAIN
    ServerAlias www.YOUR_DOMAIN

    DocumentRoot /var/www/html
    ServerSignature Off

    ErrorLog /var/log/apache2/error_log
    CustomLog /var/log/apache2/access_log combined

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Protocols h2 http/1.1

    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost/"
    </FilesMatch>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"

    TraceEnable Off

    AddOutputFilterByType DEFLATE text/plain text/html text/xml text/css application/javascript application/json

    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
    </IfModule>

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks

        <LimitExcept GET POST HEAD>
            Require all denied
        </LimitExcept>
    </Directory>

    RewriteEngine On

    RewriteCond %{HTTP_USER_AGENT} (AhrefsBot|SemrushBot|MJ12bot|DotBot|Bytespider|DataForSeoBot|PetalBot|BLEXBot|YandexBot|Sogou|Scrapy|python|curl|wget|nikto|sqlmap|masscan|crawler|spider|bot) [NC]
    RewriteRule .* - [F,L]

    RewriteCond %{HTTP_USER_AGENT} ^-?$
    RewriteRule .* - [F,L]

    <FilesMatch "^(\.env|composer\.(json|lock)|wp-config\.php|\.git)">
        Require all denied
    </FilesMatch>

    <Files xmlrpc.php>
        Require all denied
    </Files>
</VirtualHost>
